<svg xmlns="http://www.w3.org/2000/svg" width="400" height="700" viewBox="0 0 400 700">
  <!-- Fiverr-style review card -->
  <rect width="400" height="700" rx="16" fill="#1c1c1c"/>
  <rect x="0" y="0" width="400" height="60" rx="16" fill="#1dbf73"/>
  <rect x="0" y="30" width="400" height="30" fill="#1dbf73"/>
  
  <!-- Fiverr header -->
  <text x="20" y="38" fill="white" font-family="Arial" font-size="22" font-weight="bold">fiverr</text>
  <text x="280" y="38" fill="white" font-family="Arial" font-size="12">⭐ 5.0 Rating</text>
  
  <!-- Profile -->
  <circle cx="50" cy="100" r="25" fill="#262626"/>
  <text x="50" y="106" text-anchor="middle" fill="#1dbf73" font-family="Arial" font-size="16" font-weight="bold">JK</text>
  <text x="85" y="92" fill="white" font-family="Arial" font-size="14" font-weight="bold">John K.</text>
  <text x="85" y="108" fill="#b0b0b0" font-family="Arial" font-size="11">United States 🇺🇸</text>
  <text x="85" y="124" fill="#1dbf73" font-family="Arial" font-size="11">✅ Verified Buyer</text>
  
  <!-- Rating stars -->
  <text x="20" y="160" fill="#ffc107" font-family="Arial" font-size="20">★★★★★</text>
  <text x="130" y="160" fill="#b0b0b0" font-family="Arial" font-size="12">2 weeks ago</text>
  
  <!-- Review title -->
  <text x="20" y="190" fill="white" font-family="Arial" font-size="16" font-weight="bold">Exceptional AI Agent Developer!</text>
  
  <!-- Review text -->
  <text x="20" y="220" fill="#d0d0d0" font-family="Arial" font-size="12">Mamoor built an AI sales agent for our</text>
  <text x="20" y="238" fill="#d0d0d0" font-family="Arial" font-size="12">e-commerce store that handles customer</text>
  <text x="20" y="256" fill="#d0d0d0" font-family="Arial" font-size="12">inquiries 24/7. The agent increased our</text>
  <text x="20" y="274" fill="#d0d0d0" font-family="Arial" font-size="12">conversion rate by 35% in the first month!</text>
  <text x="20" y="300" fill="#d0d0d0" font-family="Arial" font-size="12">His technical depth with multi-agent systems</text>
  <text x="20" y="318" fill="#d0d0d0" font-family="Arial" font-size="12">is rare. Delivered on time, clean code,</text>
  <text x="20" y="336" fill="#d0d0d0" font-family="Arial" font-size="12">great communication throughout.</text>
  
  <!-- Gig details -->
  <rect x="20" y="360" width="360" height="60" rx="10" fill="#262626"/>
  <text x="35" y="382" fill="#b0b0b0" font-family="Arial" font-size="11">Service:</text>
  <text x="90" y="382" fill="white" font-family="Arial" font-size="11">AI Agent Development</text>
  <text x="35" y="402" fill="#b0b0b0" font-family="Arial" font-size="11">Price:</text>
  <text x="90" y="402" fill="#1dbf73" font-family="Arial" font-size="11" font-weight="bold">$2,500</text>
  <text x="160" y="402" fill="#b0b0b0" font-family="Arial" font-size="11">Duration:</text>
  <text x="230" y="402" fill="white" font-family="Arial" font-size="11">14 days</text>
  
  <!-- Response metrics -->
  <rect x="20" y="440" width="170" height="70" rx="10" fill="#262626"/>
  <text x="35" y="465" fill="#b0b0b0" font-family="Arial" font-size="10">Response Time</text>
  <text x="35" y="490" fill="#1dbf73" font-family="Arial" font-size="22" font-weight="bold">1 hr</text>
  
  <rect x="210" y="440" width="170" height="70" rx="10" fill="#262626"/>
  <text x="225" y="465" fill="#b0b0b0" font-family="Arial" font-size="10">Delivery</text>
  <text x="225" y="490" fill="#1dbf73" font-family="Arial" font-size="22" font-weight="bold">On Time</text>
  
  <!-- Bottom stats -->
  <rect x="20" y="530" width="360" height="50" rx="10" fill="#0d3d29"/>
  <text x="35" y="555" fill="#1dbf73" font-family="Arial" font-size="12">⭐ Would recommend to anyone looking for AI automation!</text>
  <text x="35" y="572" fill="#8696a0" font-family="Arial" font-size="10">Helpful? 👍 12 &nbsp;|&nbsp; 💬 3 replies</text>
  
  <!-- Seller response -->
  <rect x="20" y="600" width="360" height="80" rx="10" fill="#1a2a1a" stroke="#1dbf73" stroke-width="1"/>
  <text x="35" y="622" fill="#1dbf73" font-family="Arial" font-size="11" font-weight="bold">Mamoor replied:</text>
  <text x="35" y="642" fill="#b0b0b0" font-family="Arial" font-size="11">Thank you John! It was a pleasure building</text>
  <text x="35" y="658" fill="#b0b0b0" font-family="Arial" font-size="11">your AI agent. Happy to help with Phase 2! 🚀</text>
  <text x="35" y="674" fill="#8696a0" font-family="Arial" font-size="9">2 weeks ago</text>
</svg>