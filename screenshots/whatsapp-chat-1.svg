<svg xmlns="http://www.w3.org/2000/svg" width="400" height="700" viewBox="0 0 400 700">
  <defs>
    <linearGradient id="waBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b141a"/>
      <stop offset="100%" stop-color="#0b141a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="700" fill="url(#waBg)"/>
  <!-- Chat pattern background -->
  <rect width="400" height="700" fill="#0b141a" opacity="0.95"/>
  
  <!-- Header -->
  <rect width="400" height="60" fill="#1f2c34"/>
  <circle cx="30" cy="30" r="18" fill="#25D366"/>
  <text x="30" y="35" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">M</text>
  <text x="58" y="26" fill="white" font-family="Arial" font-size="14" font-weight="bold">Mamoor Ahmad</text>
  <text x="58" y="42" fill="#8696a0" font-family="Arial" font-size="11">online</text>
  <text x="370" y="35" text-anchor="end" fill="#8696a0" font-family="Arial" font-size="18">⋮</text>
  
  <!-- Date badge -->
  <rect x="130" y="75" width="140" height="22" rx="8" fill="#182229"/>
  <text x="200" y="90" text-anchor="middle" fill="#8696a0" font-family="Arial" font-size="10">Today</text>
  
  <!-- Client message 1 -->
  <rect x="20" y="110" width="260" height="50" rx="10" fill="#1f2c34"/>
  <text x="32" y="130" fill="#e9edef" font-family="Arial" font-size="12">Hi Mamoor, I saw your portfolio</text>
  <text x="32" y="148" fill="#e9edef" font-family="Arial" font-size="12">and I need an AI agent for my</text>
  <text x="255" y="155" text-anchor="end" fill="#8696a0" font-family="Arial" font-size="9">10:30 AM</text>
  
  <!-- Client message 2 -->
  <rect x="20" y="170" width="280" height="35" rx="10" fill="#1f2c34"/>
  <text x="32" y="190" fill="#e9edef" font-family="Arial" font-size="12">e-commerce business. Can you help?</text>
  <text x="275" y="200" text-anchor="end" fill="#8696a0" font-family="Arial" font-size="9">10:30 AM</text>
  
  <!-- Mamoor reply 1 -->
  <rect x="110" y="215" width="270" height="50" rx="10" fill="#005c4b"/>
  <text x="122" y="235" fill="#e9edef" font-family="Arial" font-size="12">Absolutely! I specialize in AI agents</text>
  <text x="122" y="253" fill="#e9edef" font-family="Arial" font-size="12">for e-commerce. Let me show you 👇</text>
  <text x="355" y="260" text-anchor="end" fill="#6fa589" font-family="Arial" font-size="9">10:32 AM ✓✓</text>
  
  <!-- Mamoor reply 2 -->
  <rect x="120" y="275" width="260" height="70" rx="10" fill="#005c4b"/>
  <text x="132" y="295" fill="#e9edef" font-family="Arial" font-size="12">I built an AI SDR Agent that handles</text>
  <text x="132" y="313" fill="#e9edef" font-family="Arial" font-size="12">sales outreach, lead qualification, and</text>
  <text x="132" y="331" fill="#e9edef" font-family="Arial" font-size="12">books meetings — all autonomous 🤖</text>
  <text x="355" y="340" text-anchor="end" fill="#6fa589" font-family="Arial" font-size="9">10:33 AM ✓✓</text>
  
  <!-- Client reply -->
  <rect x="20" y="355" width="290" height="50" rx="10" fill="#1f2c34"/>
  <text x="32" y="375" fill="#e9edef" font-family="Arial" font-size="12">That's exactly what I need! How</text>
  <text x="32" y="393" fill="#e9edef" font-family="Arial" font-size="12">much would something like that cost?</text>
  <text x="285" y="400" text-anchor="end" fill="#8696a0" font-family="Arial" font-size="9">10:35 AM</text>
  
  <!-- Mamoor pricing -->
  <rect x="100" y="415" width="280" height="70" rx="10" fill="#005c4b"/>
  <text x="112" y="435" fill="#e9edef" font-family="Arial" font-size="12">For a custom AI sales agent, it starts</text>
  <text x="112" y="453" fill="#e9edef" font-family="Arial" font-size="12">from $2,000. Includes full setup,</text>
  <text x="112" y="471" fill="#e9edef" font-family="Arial" font-size="12">training, and deployment. Ready in 2-3 weeks 🚀</text>
  <text x="355" y="480" text-anchor="end" fill="#6fa589" font-family="Arial" font-size="9">10:36 AM ✓✓</text>
  
  <!-- Client excited -->
  <rect x="20" y="495" width="250" height="50" rx="10" fill="#1f2c34"/>
  <text x="32" y="515" fill="#e9edef" font-family="Arial" font-size="12">Let's do it! When can we start? 🎉</text>
  <text x="32" y="533" fill="#e9edef" font-family="Arial" font-size="12">Your work is impressive</text>
  <text x="245" y="540" text-anchor="end" fill="#8696a0" font-family="Arial" font-size="9">10:37 AM</text>
  
  <!-- Mamoor final -->
  <rect x="130" y="555" width="250" height="35" rx="10" fill="#005c4b"/>
  <text x="142" y="575" fill="#e9edef" font-family="Arial" font-size="12">Starting right away! Let me send 📋</text>
  <text x="355" y="585" text-anchor="end" fill="#6fa589" font-family="Arial" font-size="9">10:38 AM ✓✓</text>
  
  <!-- Bottom bar -->
  <rect x="0" y="620" width="400" height="80" fill="#1f2c34"/>
  <rect x="15" y="635" width="300" height="40" rx="20" fill="#2a3942"/>
  <text x="40" y="660" fill="#8696a0" font-family="Arial" font-size="13">Type a message</text>
  <circle cx="340" cy="655" r="18" fill="#25D366"/>
  <text x="340" y="661" text-anchor="middle" fill="white" font-family="Arial" font-size="18">🎤</text>
  
  <!-- Watermark -->
  <text x="200" y="690" text-anchor="middle" fill="#8696a0" font-family="Arial" font-size="9" opacity="0.5">WhatsApp Conversation with Client</text>
</svg>