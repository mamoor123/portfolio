  <rect x="220" y="110" width="400" height="36" fill="#262010" rx="8"/>
  <rect x="220" y="110" width="60" height="36" fill="#f59e0b" opacity="0.2" rx="8"/>
  <text x="250" y="133" font-family="monospace" font-size="11" fill="#f59e0b" text-anchor="middle">POST</text>
  <text x="295" y="133" font-family="monospace" font-size="11" fill="#6b7280">/api/v1/classify</text>
  <rect x="640" y="110" width="120" height="36" fill="#f59e0b" rx="8"/>
