  <text x="240" y="365" font-family="monospace" font-size="11" fill="#9ca3af">"description": "T-shirts, singlets...</text>
  <text x="240" y="385" font-family="monospace" font-size="11" fill="#9ca3af">"duty_rate": "12%"</text>
  <text x="240" y="405" font-family="monospace" font-size="11" fill="#f59e0b">"confidence": 0.94</text>
  <text x="240" y="425" font-family="monospace" font-size="11" fill="#6b7280">"countries": ["DE","FR","IT","ES"...</text>
  <text x="400" y="485" font-size="13" fill="#6b7280" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif">🏷️ HS Code Classifier — JavaScript · API · E-commerce</text>
