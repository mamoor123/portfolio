<svg xmlns="http://www.w3.org/2000/svg" width="400" height="700" viewBox="0 0 400 700">
  <!-- Upwork-style review card -->
  <rect width="400" height="700" rx="16" fill="#1c1c1c"/>
  
  <!-- Upwork header -->
  <rect x="0" y="0" width="400" height="55" rx="16" fill="#14a800"/>
  <rect x="0" y="28" width="400" height="27" fill="#14a800"/>
  <text x="20" y="36" fill="white" font-family="Arial" font-size="20" font-weight="bold">upwork</text>
  <text x="250" y="36" fill="white" font-family="Arial" font-size="11">Top Rated Plus ⭐</text>
  
  <!-- Job title -->
  <rect x="20" y="75" width="360" height="50" rx="10" fill="#262626"/>
  <text x="35" y="97" fill="white" font-family="Arial" font-size="14" font-weight="bold">AI-Powered Customer Support System</text>
  <text x="35" y="115" fill="#b0b0b0" font-family="Arial" font-size="11">Fixed Price: $3,200 &nbsp;|&nbsp; Duration: 3 weeks</text>
  
  <!-- Rating -->
  <text x="20" y="160" fill="#ffc107" font-family="Arial" font-size="22">★★★★★</text>
  <text x="140" y="160" fill="white" font-family="Arial" font-size="14" font-weight="bold">5.0</text>
  <text x="175" y="160" fill="#b0b0b0" font-family="Arial" font-size="12">/ 5.0</text>
  
  <!-- Client info -->
  <circle cx="45" cy="200" r="22" fill="#262626"/>
  <text x="45" y="206" text-anchor="middle" fill="#14a800" font-family="Arial" font-size="14" font-weight="bold">SM</text>
  <text x="78" y="192" fill="white" font-family="Arial" font-size="13" font-weight="bold">Sarah M.</text>
  <text x="78" y="208" fill="#b0b0b0" font-family="Arial" font-size="10">CEO, TechStart Inc. 🇬🇧</text>
  <text x="78" y="224" fill="#14a800" font-family="Arial" font-size="10">💰 $50K+ spent on Upwork</text>
  
  <!-- Review metrics -->
  <rect x="20" y="245" width="110" height="55" rx="8" fill="#262626"/>
  <text x="75" y="267" text-anchor="middle" fill="#14a800" font-family="Arial" font-size="20" font-weight="bold">5.0</text>
  <text x="75" y="287" text-anchor="middle" fill="#b0b0b0" font-family="Arial" font-size="9">Quality</text>
  
  <rect x="145" y="245" width="110" height="55" rx="8" fill="#262626"/>
  <text x="200" y="267" text-anchor="middle" fill="#14a800" font-family="Arial" font-size="20" font-weight="bold">5.0</text>
  <text x="200" y="287" text-anchor="middle" fill="#b0b0b0" font-family="Arial" font-size="9">Communication</text>
  
  <rect x="270" y="245" width="110" height="55" rx="8" fill="#262626"/>
  <text x="325" y="267" text-anchor="middle" fill="#14a800" font-family="Arial" font-size="20" font-weight="bold">5.0</text>
  <text x="325" y="287" text-anchor="middle" fill="#b0b0b0" font-family="Arial" font-size="9">Schedule</text>
  
  <!-- Review text -->
  <text x="20" y="340" fill="white" font-family="Arial" font-size="14" font-weight="bold">Detailed Review</text>
  
  <text x="20" y="370" fill="#d0d0d0" font-family="Arial" font-size="12">Mamoor is an outstanding developer who</text>
  <text x="20" y="388" fill="#d0d0d0" font-family="Arial" font-size="12">exceeded all expectations. He built a full</text>
  <text x="20" y="406" fill="#d0d0d0" font-family="Arial" font-size="12">AI customer support system with:</text>
  
  <text x="30" y="434" fill="#14a800" font-family="Arial" font-size="11">✓ Multi-agent architecture</text>
  <text x="30" y="454" fill="#14a800" font-family="Arial" font-size="11">✓ 24/7 autonomous operation</text>
  <text x="30" y="474" fill="#14a800" font-family="Arial" font-size="11">✓ Integration with existing CRM</text>
  <text x="30" y="494" fill="#14a800" font-family="Arial" font-size="11">✓ Real-time sentiment analysis</text>
  <text x="30" y="514" fill="#14a800" font-family="Arial" font-size="11">✓ Human handoff when needed</text>
  
  <text x="20" y="544" fill="#d0d0d0" font-family="Arial" font-size="12">The system reduced our support tickets by</text>
  <text x="20" y="562" fill="#d0d0d0" font-family="Arial" font-size="12">60% and improved customer satisfaction.</text>
  <text x="20" y="580" fill="#d0d0d0" font-family="Arial" font-size="12">Highly recommend for any AI project! 🚀</text>
  
  <!-- Bottom -->
  <rect x="20" y="600" width="360" height="45" rx="10" fill="#0d2d0d"/>
  <text x="35" y="625" fill="#14a800" font-family="Arial" font-size="12" font-weight="bold">🏆 Would hire again — 100%</text>
  <text x="35" y="640" fill="#8696a0" font-family="Arial" font-size="10">Job completed &nbsp;|&nbsp; 3 weeks &nbsp;|&nbsp; $3,200</text>
  
  <!-- Repeat client badge -->
  <rect x="20" y="660" width="360" height="25" rx="6" fill="#14a800" opacity="0.15"/>
  <text x="200" y="678" text-anchor="middle" fill="#14a800" font-family="Arial" font-size="10">🔄 Repeat Client — 3rd project with Mamoor</text>
</svg>