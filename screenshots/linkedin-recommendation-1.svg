<svg xmlns="http://www.w3.org/2000/svg" width="400" height="700" viewBox="0 0 400 700">
  <rect width="400" height="700" rx="16" fill="#1c1c1c"/>
  <!-- LinkedIn header -->
  <rect x="0" y="0" width="400" height="60" rx="16" fill="#0a66c2"/>
  <rect x="0" y="30" width="400" height="30" fill="#0a66c2"/>
  <text x="20" y="38" fill="white" font-family="Arial,sans-serif" font-size="22" font-weight="bold">LinkedIn</text>
  <text x="260" y="38" fill="white" font-family="Arial,sans-serif" font-size="11">Recommendations</text>
