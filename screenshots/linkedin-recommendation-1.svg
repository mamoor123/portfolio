  <text x="55" y="126" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="14" font-weight="bold">DA</text>
  <text x="90" y="108" fill="white" font-family="Arial,sans-serif" font-size="14" font-weight="bold">David A.</text>
  <text x="90" y="124" fill="#b0b0b0" font-family="Arial,sans-serif" font-size="11">CTO at InnovateTech</text>
  <text x="90" y="140" fill="#0a66c2" font-family="Arial,sans-serif" font-size="10">1st connection</text>
  <text x="340" y="108" text-anchor="end" fill="#b0b0b0" font-family="Arial,sans-serif" font-size="10">March 2026</text>
