<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050505"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(60,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(120,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(180,0)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="1" transform="translate(0,60)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="1" transform="translate(0,120)"/>
  </g>
  <!-- Glow orbs -->
  <circle cx="900" cy="100" r="300" fill="url(#glow)" opacity="0.4"/>
  <circle cx="200" cy="500" r="250" fill="#ec4899" opacity="0.08"/>
  <!-- Accent line -->
  <rect x="80" y="200" width="80" height="4" fill="url(#accent)" rx="2"/>
  <!-- Name -->
  <text x="80" y="270" font-family="Inter,system-ui,sans-serif" font-size="64" font-weight="900" fill="#e8e8e8" letter-spacing="-2">Mamoor Ahmad</text>
  <!-- Title -->
  <text x="80" y="330" font-family="Inter,system-ui,sans-serif" font-size="28" font-weight="500" fill="#888">AI &amp; Full-Stack Developer</text>
  <!-- Gradient subtitle -->
  <text x="80" y="380" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700" fill="url(#accent)">28+ Projects Shipped</text>
  <!-- Stats -->
  <g transform="translate(80,430)">
    <rect width="120" height="60" rx="10" fill="#111" stroke="#1a1a1a"/>
    <text x="60" y="28" font-family="Inter,sans-serif" font-size="24" font-weight="800" fill="#6366f1" text-anchor="middle">15</text>
    <text x="60" y="48" font-family="Inter,sans-serif" font-size="11" fill="#555" text-anchor="middle">AI Products</text>
    <g transform="translate(140,0)">
      <rect width="120" height="60" rx="10" fill="#111" stroke="#1a1a1a"/>
      <text x="60" y="28" font-family="Inter,sans-serif" font-size="24" font-weight="800" fill="#06b6d4" text-anchor="middle">8</text>
      <text x="60" y="48" font-family="Inter,sans-serif" font-size="11" fill="#555" text-anchor="middle">SaaS Platforms</text>
    </g>
    <g transform="translate(280,0)">
      <rect width="120" height="60" rx="10" fill="#111" stroke="#1a1a1a"/>
      <text x="60" y="28" font-family="Inter,sans-serif" font-size="24" font-weight="800" fill="#ec4899" text-anchor="middle">6</text>
      <text x="60" y="48" font-family="Inter,sans-serif" font-size="11" fill="#555" text-anchor="middle">Live Products</text>
    </g>
  </g>
  <!-- Badge -->
  <g transform="translate(80,530)">
    <rect width="200" height="36" rx="18" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.3)"/>
    <circle cx="24" cy="18" r="5" fill="#22c55e"/>
    <text x="40" y="23" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#22c55e">Available for hire</text>
  </g>
  <!-- URL -->
  <text x="1120" y="600" font-family="JetBrains Mono,monospace" font-size="14" fill="#555" text-anchor="end">github.com/mamoor123</text>
</svg>
