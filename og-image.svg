<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Gradient orb -->
  <circle cx="900" cy="315" r="200" fill="url(#accent)" opacity="0.08"/>
  <!-- Code bracket -->
  <text x="80" y="260" fill="#6366f1" font-family="JetBrains Mono,monospace" font-size="120" opacity="0.15">&lt;/&gt;</text>
  <!-- Name -->
  <text x="80" y="280" fill="#fff" font-family="Inter,sans-serif" font-size="64" font-weight="900" letter-spacing="-2">Mamoor Ahmad</text>
  <!-- Title -->
  <text x="80" y="340" fill="url(#accent)" font-family="Inter,sans-serif" font-size="32" font-weight="700">AI &amp; Full-Stack Developer</text>
  <!-- Stats -->
  <g transform="translate(80,400)">
    <rect width="200" height="80" rx="12" fill="#111" stroke="#1a1a1a" stroke-width="1"/>
    <text x="100" y="35" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-size="36" font-weight="800">28+</text>
    <text x="100" y="60" text-anchor="middle" fill="#888" font-family="Inter,sans-serif" font-size="14">Projects Shipped</text>
  </g>
  <g transform="translate(300,400)">
    <rect width="200" height="80" rx="12" fill="#111" stroke="#1a1a1a" stroke-width="1"/>
    <text x="100" y="35" text-anchor="middle" fill="#22c55e" font-family="Inter,sans-serif" font-size="36" font-weight="800">100%</text>
    <text x="100" y="60" text-anchor="middle" fill="#888" font-family="Inter,sans-serif" font-size="14">Client Satisfaction</text>
  </g>
  <g transform="translate(520,400)">
    <rect width="200" height="80" rx="12" fill="#111" stroke="#1a1a1a" stroke-width="1"/>
    <text x="100" y="35" text-anchor="middle" fill="#06b6d4" font-family="Inter,sans-serif" font-size="36" font-weight="800">5.0</text>
    <text x="100" y="60" text-anchor="middle" fill="#888" font-family="Inter,sans-serif" font-size="14">Average Rating</text>
  </g>
  <!-- Tags -->
  <text x="80" y="540" fill="#555" font-family="JetBrains Mono,monospace" font-size="16">AI Agents • SaaS • Climate Tech • Chrome Extensions</text>
  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#accent)" opacity="0.3"/>
</svg>